<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" fill="none" role="img" aria-label="Agent Forge architecture: Gateway, Harness, Runtime, Telemetry, LLM API">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a81f6"/>
      <stop offset="100%" stop-color="#2563ef"/>
    </linearGradient>
    <linearGradient id="brandSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3a81f6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563ef" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#2563ef" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    .node { animation: pulse 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .node.b { animation-delay: .4s; }
    .node.c { animation-delay: .8s; }
    .node.d { animation-delay: 1.2s; }
    .flow { stroke-dasharray: 5 9; animation: dash 2.4s linear infinite; }
    .ring { transform-box: fill-box; transform-origin: center; animation: spin 22s linear infinite; }
    .spark { animation: float 4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: .82; } 50% { opacity: 1; } }
    @keyframes dash { to { stroke-dashoffset: -140; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  </style>

  <circle cx="280" cy="240" r="210" fill="url(#glow)"/>

  <g class="ring">
    <circle cx="280" cy="240" r="172" stroke="url(#brandSoft)" stroke-opacity="0.22" stroke-width="1.5" stroke-dasharray="2 8"/>
    <circle cx="452" cy="240" r="6" fill="url(#brand)" class="spark"/>
  </g>

  <g stroke="url(#brandSoft)" stroke-width="2" opacity="0.5">
    <line class="flow" x1="280" y1="240" x2="150" y2="132"/>
    <line class="flow" x1="280" y1="240" x2="410" y2="132"/>
    <line class="flow" x1="280" y1="240" x2="150" y2="348"/>
    <line class="flow" x1="280" y1="240" x2="410" y2="348"/>
  </g>

  <g class="node">
    <circle cx="280" cy="240" r="64" fill="#0a0a0a" stroke="url(#brand)" stroke-width="2.5"/>
    <circle cx="280" cy="240" r="64" fill="url(#glow)" opacity="0.55"/>
    <text x="280" y="235" text-anchor="middle" fill="#fafafa" font-family="'Geist Mono','JetBrains Mono',monospace" font-size="15" font-weight="600">Runtime</text>
    <text x="280" y="256" text-anchor="middle" fill="#a1a1a1" font-family="'Geist Mono','JetBrains Mono',monospace" font-size="11">Agent ABC</text>
  </g>

  <g class="node a"><circle cx="150" cy="132" r="34" fill="#0a0a0a" stroke="url(#brandSoft)" stroke-width="2"/><text x="150" y="136" text-anchor="middle" fill="#fafafa" font-family="'Geist Mono',monospace" font-size="11">Gateway</text></g>
  <g class="node b"><circle cx="410" cy="132" r="34" fill="#0a0a0a" stroke="url(#brandSoft)" stroke-width="2"/><text x="410" y="136" text-anchor="middle" fill="#fafafa" font-family="'Geist Mono',monospace" font-size="11">Harness</text></g>
  <g class="node c"><circle cx="150" cy="348" r="34" fill="#0a0a0a" stroke="url(#brandSoft)" stroke-width="2"/><text x="150" y="352" text-anchor="middle" fill="#fafafa" font-family="'Geist Mono',monospace" font-size="11">Telemetry</text></g>
  <g class="node d"><circle cx="410" cy="348" r="34" fill="#0a0a0a" stroke="url(#brandSoft)" stroke-width="2"/><text x="410" y="352" text-anchor="middle" fill="#fafafa" font-family="'Geist Mono',monospace" font-size="11">LLM API</text></g>
</svg>
