      <stop offset="0%" stop-color="#3a81f6"/>
      <stop offset="100%" stop-color="#2563ef"/>
    </linearGradient>
  </defs>
  <!-- Orbit ring -->
  <ellipse cx="16" cy="16" rx="13" ry="6" stroke="#2563ef" stroke-width="1.2" fill="none" opacity="0.4" transform="rotate(-30 16 16)"/>
