  <circle cx="16" cy="16" r="2" fill="#ffffff" opacity="0.85"/>
  <!-- Orbiting dots -->
  <circle cx="4" cy="12" r="2.5" fill="#3a81f6"/>
  <circle cx="28" cy="12" r="2.5" fill="#3a81f6"/>
  <circle cx="10" cy="27" r="2.5" fill="#3a81f6"/>
