<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Variant A: Network Nodes — interconnected agent nodes -->
  <defs>
    <linearGradient id="gA" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#3a81f6"/>
      <stop offset="100%" stop-color="#2563ef"/>
    </linearGradient>
  </defs>
  <!-- Connections -->
  <line x1="16" y1="6" x2="6" y2="18" stroke="#2563ef" stroke-width="1.5" opacity="0.5"/>
  <line x1="16" y1="6" x2="26" y2="18" stroke="#2563ef" stroke-width="1.5" opacity="0.5"/>
  <line x1="6" y1="18" x2="26" y2="18" stroke="#2563ef" stroke-width="1.5" opacity="0.5"/>
  <line x1="16" y1="6" x2="16" y2="26" stroke="#2563ef" stroke-width="1.5" opacity="0.5"/>
  <line x1="6" y1="18" x2="16" y2="26" stroke="#2563ef" stroke-width="1.5" opacity="0.5"/>
  <line x1="26" y1="18" x2="16" y2="26" stroke="#2563ef" stroke-width="1.5" opacity="0.5"/>
  <!-- Nodes -->
  <circle cx="16" cy="6" r="4" fill="url(#gA)"/>
  <circle cx="6" cy="18" r="4" fill="url(#gA)"/>
  <circle cx="26" cy="18" r="4" fill="url(#gA)"/>
  <circle cx="16" cy="26" r="4" fill="url(#gA)"/>
  <!-- Center hub -->
  <circle cx="16" cy="16" r="3" fill="#2563ef" opacity="0.8"/>
</svg>